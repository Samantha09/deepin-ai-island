<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: "Segoe UI", "Microsoft YaHei UI", "PingFang SC", sans-serif;
      -webkit-user-select: none;
      user-select: none;
    }

    /* 胶囊容器 */
    #capsule {
      width: 100%;
      height: 100%;
      border-radius: 20px;
      background: rgba(20, 20, 20, 0.85);
      color: #ffffff;
      box-sizing: border-box;
      border: none;
      outline: none;
      box-shadow: none;
      transition: border-radius 220ms ease, background 220ms ease;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      position: relative;
    }

    /* 默认页面 */
    #main-page {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: flex-start;
      overflow: hidden;
      position: relative;
    }

    /* 顶部状态行 */
    #status-row {
      width: 100%;
      height: 45px;
      flex: 0 0 45px;
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-sizing: border-box;
    }

    /* 状态点 */
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      transition: background-color 200ms ease;
    }
    .status-dot.idle { background: #CAFF00; }
    .status-dot.active { background: #66E8F8; }
    .status-dot.waiting { background: #F59E0B; }
    .status-dot.error { background: #EF4444; }

    /* 中间信息 */
    #center-info {
      font-size: 13px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.9);
      text-align: center;
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding: 0 8px;
    }

    /* 右侧设置按钮 */
    #settings-btn {
      width: 24px;
      height: 24px;
      padding: 0;
      border: none;
      border-radius: 50%;
      background: transparent;
      color: rgba(255, 255, 255, 0.6);
      font-size: 14px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: all 140ms ease;
    }
    #settings-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.95);
    }

    /* 悬停展开面板 */
    #session-panel {
      display: block;
      position: absolute;
      left: 0;
      top: 45px;
      width: 100%;
      max-height: 260px;
      padding: 4px 10px 10px 10px;
      box-sizing: border-box;
      opacity: 0;
      transform: translateY(-4px);
      transition: opacity 160ms ease, transform 160ms ease;
      pointer-events: none;
      overflow-y: auto;
      overflow-x: hidden;
    }
    #session-panel::-webkit-scrollbar {
      width: 4px;
    }
    #session-panel::-webkit-scrollbar-track {
      background: transparent;
    }
    #session-panel::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 2px;
    }
    #capsule.hovered #session-panel {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    /* 会话卡片 */
    .session-cards {
      display: flex;
      flex-direction: column;
      gap: 3px;
      width: 100%;
    }
    .session-card {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      padding: 8px 12px;
      backdrop-filter: blur(8px);
      transition: all 140ms ease;
      cursor: pointer;
    }
    .session-card:hover {
      background: rgba(255, 255, 255, 0.12);
      transform: translateY(-1px);
    }
    .session-card-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
    }
    .session-name {
      font-size: 12px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.92);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .session-agent {
      font-size: 10px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.55);
      background: rgba(255, 255, 255, 0.08);
      border-radius: 4px;
      padding: 1px 6px;
      white-space: nowrap;
    }
    .session-status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-right: 6px;
    }
    .session-status-dot.running { background: #66E8F8; }
    .session-status-dot.needs_attention { background: #F59E0B; }
    .session-status-dot.completed { background: #4ADE80; }
    .session-status-dot.idle { background: #9A9A9A; }
    .session-summary {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.45);
      margin-top: 3px;
      line-height: 1.35;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .session-waiting {
      font-size: 10px;
      color: #F59E0B;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* 快捷审批按钮 */
    .quick-perm {
      display: flex;
      gap: 6px;
      margin-top: 6px;
    }
    .quick-perm button {
      flex: 1;
      padding: 5px 0;
      border: none;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all 120ms ease;
    }
    .quick-deny {
      background: rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.8);
    }
    .quick-deny:hover {
      background: rgba(255, 255, 255, 0.14);
    }
    .quick-allow {
      background: rgba(52, 199, 89, 0.85);
      color: #000000;
    }
    .quick-allow:hover {
      background: rgba(52, 199, 89, 1);
    }

    /* 底部提示 */
    #hover-hint {
      position: absolute;
      left: 50%;
      bottom: 4px;
      transform: translateX(-50%);
      font-size: 11px;
      line-height: 16px;
      color: rgba(255, 255, 255, 0.5);
      letter-spacing: 0.5px;
      opacity: 0;
      transition: all 140ms ease;
      pointer-events: none;
      user-select: none;
      white-space: nowrap;
      padding: 2px 10px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 8px;
    }
    #capsule.hovered #hover-hint {
      opacity: 1;
    }

    /* 空状态 */
    .empty-state {
      text-align: center;
      color: rgba(255, 255, 255, 0.35);
      font-size: 12px;
      padding: 8px 0;
    }
  </style>
</head>
<body>
  <div id="capsule">
    <div id="main-page">
      <div id="status-row">
        <div id="status-dot" class="status-dot idle"></div>
        <div id="center-info">AI Island</div>
        <button id="settings-btn" type="button" aria-label="settings">⋯</button>
      </div>
      <div id="session-panel">
        <div class="session-cards" id="session-list">
          <div class="empty-state">暂无活跃会话</div>
        </div>
      </div>
      <div id="hover-hint">悬停展开</div>
    </div>
  </div>

  <script>
    let bridge = null;
    let hoverTimer = null;
    let hoverActive = false;

    const capsule = document.getElementById("capsule");
    const statusDot = document.getElementById("status-dot");
    const centerInfo = document.getElementById("center-info");
    const sessionList = document.getElementById("session-list");
    const settingsBtn = document.getElementById("settings-btn");

    // 建立 QWebChannel
    new QWebChannel(qt.webChannelTransport, function (channel) {
      bridge = channel.objects.pyisland;
    });

    // 鼠标进入
    capsule.addEventListener("mouseenter", function () {
      if (hoverTimer) clearTimeout(hoverTimer);
      hoverTimer = setTimeout(function () {
        hoverActive = true;
        capsule.classList.add("hovered");
        if (bridge) bridge.setHovered(true);
      }, 120);
    });

    // 鼠标离开
    capsule.addEventListener("mouseleave", function () {
      if (hoverTimer) {
        clearTimeout(hoverTimer);
        hoverTimer = null;
      }
      if (hoverActive) {
        hoverActive = false;
        capsule.classList.remove("hovered");
        if (bridge) bridge.setHovered(false);
      }
    });

    // 设置按钮点击
    settingsBtn.addEventListener("click", function (e) {
      e.stopPropagation();
      if (bridge) bridge.openExpandedWindow();
    });

    // 更新会话数据
    window.updateSessions = function (data) {
      const sessions = data.sessions || [];
      const total = data.total || 0;
      const waiting = data.waiting || 0;
      const active = data.active || 0;

      // 更新状态点
      statusDot.className = "status-dot";
      if (waiting > 0) {
        statusDot.classList.add("waiting");
      } else if (active > 0) {
        statusDot.classList.add("active");
      } else {
        statusDot.classList.add("idle");
      }

      // 更新中间信息
      if (waiting > 0) {
        const firstWaiting = sessions.find(s => s.status === "needs_attention");
        centerInfo.textContent = firstWaiting ? firstWaiting.name : ("需要审批: " + waiting);
      } else if (active > 0) {
        centerInfo.textContent = active + " 个会话运行中";
      } else if (total > 0) {
        centerInfo.textContent = total + " 个会话";
      } else {
        centerInfo.textContent = "AI Island";
      }

      // 更新会话列表
      if (sessions.length === 0) {
        sessionList.innerHTML = '<div class="empty-state">暂无活跃会话</div>';
        return;
      }

      sessionList.innerHTML = "";
      sessions.forEach(function (session) {
        const card = document.createElement("div");
        card.className = "session-card";
        card.addEventListener("click", function () {
          if (bridge) bridge.selectSession(session.id);
        });

        const row = document.createElement("div");
        row.className = "session-card-row";

        const left = document.createElement("div");
        left.style.display = "flex";
        left.style.alignItems = "center";
        left.style.minWidth = "0";
        left.style.flex = "1";

        const dot = document.createElement("div");
        dot.className = "session-status-dot " + (session.status || "idle");

        const name = document.createElement("div");
        name.className = "session-name";
        name.textContent = session.name;
        name.style.marginLeft = "4px";

        left.appendChild(dot);
        left.appendChild(name);

        row.appendChild(left);
        card.appendChild(row);

        // 工作概要（1-2行）
        if (session.summary) {
          const summaryEl = document.createElement("div");
          summaryEl.className = "session-summary";
          summaryEl.textContent = session.summary;
          card.appendChild(summaryEl);
        }

        // 只要状态是 needs_attention 就显示审批按钮
        if (session.status === "needs_attention") {
          if (session.waiting_action) {
            const waitingText = document.createElement("div");
            waitingText.className = "session-waiting";
            waitingText.textContent = "需要审批: " + session.waiting_action;
            card.appendChild(waitingText);
          }

          const permRow = document.createElement("div");
          permRow.className = "quick-perm";

          const denyBtn = document.createElement("button");
          denyBtn.className = "quick-deny";
          denyBtn.textContent = "拒绝";
          denyBtn.addEventListener("click", function (e) {
            e.stopPropagation();
            if (bridge) bridge.respondPermission(session.id, false);
            card.style.opacity = "0.5";
            card.style.pointerEvents = "none";
          });

          const allowBtn = document.createElement("button");
          allowBtn.className = "quick-allow";
          allowBtn.textContent = "允许";
          allowBtn.addEventListener("click", function (e) {
            e.stopPropagation();
            if (bridge) bridge.respondPermission(session.id, true);
            card.style.opacity = "0.5";
            card.style.pointerEvents = "none";
          });

          permRow.appendChild(denyBtn);
          permRow.appendChild(allowBtn);
          card.appendChild(permRow);
        }

        sessionList.appendChild(card);
      });
    };
  </script>
</body>
</html>
