<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: "Segoe UI", "Microsoft YaHei UI", "PingFang SC", sans-serif;
      -webkit-user-select: none;
      user-select: none;
    }
    #panel {
      width: 100%;
      height: 100%;
      border-radius: 20px;
      background: rgba(20, 20, 20, 0.95);
      box-sizing: border-box;
      position: relative;
      border: none;
      outline: none;
      opacity: 0;
      transform: translateY(10px) scale(0.96);
      transition: opacity 180ms ease-out, transform 220ms cubic-bezier(0.22, 1, 0.36, 1);
      will-change: opacity, transform;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #panel.entered {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
    #close-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 20px;
      height: 20px;
      border: none;
      border-radius: 50%;
      background: rgba(255, 59, 48, 0.85);
      cursor: pointer;
      padding: 0;
      z-index: 10;
      transition: all 140ms ease;
    }
    #close-btn:hover {
      background: rgba(255, 59, 48, 1);
      transform: scale(1.1);
    }
    #header {
      padding: 14px 16px 8px 16px;
      flex-shrink: 0;
    }
    #session-title {
      font-size: 14px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.95);
      margin: 0;
      padding-right: 30px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #session-agent {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.5);
      margin-top: 2px;
    }
    #content {
      flex: 1;
      overflow-y: auto;
      padding: 0 12px 12px 12px;
      box-sizing: border-box;
    }
    /* 隐藏滚动条 */
    #content::-webkit-scrollbar {
      width: 0;
      background: transparent;
    }

    /* 消息气泡 */
    .message-row {
      display: flex;
      margin-bottom: 8px;
      align-items: flex-start;
    }
    .message-row.user {
      justify-content: flex-end;
    }
    .message-row.assistant {
      justify-content: flex-start;
    }
    .message-bubble {
      max-width: 85%;
      padding: 8px 12px;
      border-radius: 14px;
      font-size: 12px;
      line-height: 1.45;
      word-break: break-word;
    }
    .message-row.user .message-bubble {
      background: rgba(52, 152, 219, 0.25);
      color: rgba(255, 255, 255, 0.92);
      border-bottom-right-radius: 4px;
    }
    .message-row.assistant .message-bubble {
      background: rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.9);
      border-bottom-left-radius: 4px;
    }
    .message-row.system .message-bubble {
      background: transparent;
      color: rgba(255, 255, 255, 0.4);
      font-size: 11px;
      padding: 2px 0;
    }

    /* Markdown 样式 */
    .message-bubble p {
      margin: 0 0 4px 0;
    }
    .message-bubble p:last-child {
      margin-bottom: 0;
    }
    .message-bubble code {
      font-family: "SF Mono", "Fira Code", "DejaVu Sans Mono", monospace;
      font-size: 11px;
      background: rgba(255, 255, 255, 0.12);
      color: rgba(255, 255, 255, 0.85);
      padding: 1px 4px;
      border-radius: 4px;
    }
    .message-bubble pre {
      background: rgba(0, 0, 0, 0.35);
      padding: 8px 10px;
      border-radius: 8px;
      overflow-x: auto;
      margin: 4px 0;
      max-width: 100%;
    }
    .message-bubble pre code {
      background: transparent;
      padding: 0;
      font-size: 11px;
    }
    .message-bubble blockquote {
      margin: 4px 0;
      padding-left: 10px;
      border-left: 3px solid rgba(255, 255, 255, 0.2);
      color: rgba(255, 255, 255, 0.7);
    }
    .message-bubble ul, .message-bubble ol {
      margin: 4px 0;
      padding-left: 18px;
    }
    .message-bubble li {
      margin: 2px 0;
    }
    .message-bubble a {
      color: #66E8F8;
      text-decoration: none;
    }
    .message-bubble a:hover {
      text-decoration: underline;
    }
    .message-bubble hr {
      border: none;
      border-top: 1px solid rgba(255, 255, 255, 0.15);
      margin: 8px 0;
    }
    .message-bubble strong {
      color: rgba(255, 255, 255, 0.95);
    }

    /* 提问卡片 */
    .question-card {
      background: rgba(59, 130, 246, 0.12);
      border: 1px solid rgba(59, 130, 246, 0.25);
      border-radius: 14px;
      padding: 12px;
      margin-bottom: 10px;
    }
    .question-title {
      font-size: 12px;
      font-weight: 600;
      color: #3B82F6;
      margin-bottom: 8px;
    }
    .question-options {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .question-option-btn {
      padding: 8px 12px;
      border: none;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 140ms ease;
      background: rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.9);
      text-align: left;
    }
    .question-option-btn:hover {
      background: rgba(59, 130, 246, 0.35);
      color: #fff;
    }
    .question-other-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .question-other-btn .edit-icon {
      font-size: 13px;
      opacity: 0.6;
    }
    .question-input-area {
      display: none;
      margin-top: 6px;
      gap: 6px;
    }
    .question-input-area.expanded {
      display: flex;
    }
    .question-input {
      flex: 1;
      padding: 8px 10px;
      border: 1px solid rgba(59, 130, 246, 0.4);
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.25);
      color: rgba(255, 255, 255, 0.9);
      font-size: 12px;
      outline: none;
    }
    .question-input::placeholder {
      color: rgba(255, 255, 255, 0.35);
    }
    .question-send-btn {
      padding: 8px 14px;
      border: none;
      border-radius: 8px;
      background: rgba(59, 130, 246, 0.85);
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 140ms ease;
    }
    .question-send-btn:hover {
      background: rgba(59, 130, 246, 1);
    }
    .question-card.answered {
      opacity: 0.5;
      pointer-events: none;
    }
    .question-answer-result {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.6);
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px solid rgba(59, 130, 246, 0.15);
    }

    /* 审批卡片 */
    .permission-card {
      background: rgba(245, 158, 11, 0.12);
      border: 1px solid rgba(245, 158, 11, 0.25);
      border-radius: 14px;
      padding: 12px;
      margin-bottom: 10px;
    }
    .permission-title {
      font-size: 12px;
      font-weight: 600;
      color: #F59E0B;
      margin-bottom: 4px;
    }
    .permission-action {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.75);
      margin-bottom: 10px;
      font-family: 'DejaVu Sans Mono', monospace;
    }
    .permission-buttons {
      display: flex;
      gap: 8px;
    }
    .perm-btn {
      flex: 1;
      padding: 8px 0;
      border: none;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 140ms ease;
    }
    .perm-btn-deny {
      background: rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.85);
    }
    .perm-btn-deny:hover {
      background: rgba(255, 255, 255, 0.14);
    }
    .perm-btn-allow {
      background: rgba(52, 199, 89, 0.85);
      color: #000000;
    }
    .perm-btn-allow:hover {
      background: rgba(52, 199, 89, 1);
    }
    .perm-btn-allow-all {
      background: rgba(52, 199, 89, 0.55);
      color: #000000;
    }
    .perm-btn-allow-all:hover {
      background: rgba(52, 199, 89, 0.75);
    }

    /* 空状态 */
    .empty-detail {
      text-align: center;
      color: rgba(255, 255, 255, 0.3);
      font-size: 12px;
      padding: 40px 0;
    }
  </style>
</head>
<body>
  <div id="panel">
    <button id="close-btn" type="button" aria-label="close"></button>
    <div id="header">
      <div id="session-title">会话详情</div>
      <div id="session-agent"></div>
    </div>
    <div id="content">
      <div class="empty-detail">选择一个会话查看详情</div>
    </div>
  </div>

  <script>
    let bridge = null;
    const panel = document.getElementById("panel");
    const closeBtn = document.getElementById("close-btn");
    const sessionTitle = document.getElementById("session-title");
    const sessionAgent = document.getElementById("session-agent");
    const content = document.getElementById("content");

    let currentSessionId = null;
    let resolvedPermissions = new Set();

    new QWebChannel(qt.webChannelTransport, function (channel) {
      bridge = channel.objects.pyisland;
      closeBtn.addEventListener("click", function () {
        if (bridge) bridge.closeExpandedWindow();
      });
    });

    // Markdown 渲染（安全转义 + 常用语法）
    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }
    function processInline(text) {
      text = text.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
      text = text.replace(/__([^_]+)__/g, "<strong>$1</strong>");
      text = text.replace(/\*([^*]+)\*/g, "<em>$1</em>");
      text = text.replace(/_([^_]+)_/g, "<em>$1</em>");
      text = text.replace(/`([^`]+)`/g, "<code>$1</code>");
      text = text.replace(/~~([^~]+)~~/g, "<del>$1</del>");
      text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
      return text;
    }
    function markdownToHtml(text) {
      const codeBlocks = [];
      text = text.replace(/```(\w*)\n([\s\S]*?)```/g, function(match, lang, code) {
        const placeholder = "__CODE_BLOCK_" + codeBlocks.length + "__";
        codeBlocks.push(escapeHtml(code.trim()));
        return "\n\n" + placeholder + "\n\n";
      });
      text = escapeHtml(text);

      const lines = text.split("\n");
      const result = [];
      let inList = false;
      let listItems = [];
      let listType = null;

      function flushList() {
        if (inList && listItems.length > 0) {
          result.push("<" + listType + ">" + listItems.join("") + "</" + listType + ">");
        }
        inList = false;
        listItems = [];
        listType = null;
      }

      for (let i = 0; i < lines.length; i++) {
        let line = lines[i];
        const trimmed = line.trim();

        if (!trimmed) {
          flushList();
          continue;
        }

        if (trimmed.startsWith("__CODE_BLOCK_") && trimmed.endsWith("__")) {
          flushList();
          const idx = parseInt(trimmed.match(/__CODE_BLOCK_(\d+)__/)[1], 10);
          result.push("<pre><code>" + codeBlocks[idx] + "</code></pre>");
          continue;
        }

        if (line.startsWith("&gt;")) {
          flushList();
          result.push("<blockquote>" + processInline(line.replace(/^&gt; ?/, "")) + "</blockquote>");
          continue;
        }

        if (/^---+/.test(trimmed)) {
          flushList();
          result.push("<hr>");
          continue;
        }

        if (trimmed.startsWith("- ")) {
          if (!inList || listType !== "ul") {
            flushList();
            inList = true;
            listType = "ul";
          }
          listItems.push("<li>" + processInline(trimmed.slice(2)) + "</li>");
          continue;
        }

        if (/^\d+\. /.test(trimmed)) {
          if (!inList || listType !== "ol") {
            flushList();
            inList = true;
            listType = "ol";
          }
          const itemText = trimmed.replace(/^\d+\. /, "");
          listItems.push("<li>" + processInline(itemText) + "</li>");
          continue;
        }

        flushList();
        let paraLines = [line];
        while (i + 1 < lines.length && lines[i + 1].trim() &&
               !lines[i + 1].trim().startsWith("__CODE_BLOCK_") &&
               !lines[i + 1].startsWith("&gt;") &&
               !/^---+/.test(lines[i + 1].trim()) &&
               !lines[i + 1].trim().startsWith("- ") &&
               !/^\d+\. /.test(lines[i + 1].trim())) {
          paraLines.push(lines[++i]);
        }
        const paraHtml = paraLines.map(l => processInline(l)).join("<br>");
        result.push("<p>" + paraHtml + "</p>");
      }

      flushList();
      return result.join("\n");
    }

    window.playEntrance = function () {
      if (!panel) return;
      panel.classList.remove("entered");
      requestAnimationFrame(function () {
        requestAnimationFrame(function () {
          panel.classList.add("entered");
        });
      });
    };

    window.updateSessionDetail = function (data) {
      currentSessionId = data.id;
      sessionTitle.textContent = data.name || "未命名会话";
      sessionAgent.textContent = data.agent || "";

      // 同步后端已解决的 permission id，避免列表页审批后详情页仍可点击
      resolvedPermissions = new Set(data.resolved_tool_use_ids || []);

      content.innerHTML = "";

      const events = data.events || [];
      if (events.length === 0) {
        content.innerHTML = '<div class="empty-detail">暂无聊天记录</div>';
        return;
      }

      events.forEach(function (event) {
        renderEvent(event);
      });

      // 滚动到底部
      content.scrollTop = content.scrollHeight;
    };

    function renderEvent(event) {
      const type = event.type;
      const payload = event.payload || {};

      if (type === "chat.message") {
        const role = payload.role || "assistant";
        const text = payload.content || "";
        addMessage(role, text);
      } else if (type === "permission.requested") {
        const action = payload.action || "";
        const toolUseId = payload.tool_use_id || "";
        if (!resolvedPermissions.has(toolUseId)) {
          addPermissionCard(toolUseId, action);
        }
      } else if (type === "question.asked") {
        const question = payload.question || "";
        const options = payload.options || [];
        const toolUseId = payload.tool_use_id || "";
        if (!resolvedPermissions.has(toolUseId)) {
          addQuestionCard(toolUseId, question, options);
        }
      } else if (type === "progress.updated") {
        const msg = payload.message || "";
        if (msg && msg !== "idle") {
          addMessage("system", msg);
        }
      }
    }

    function addMessage(role, text) {
      const row = document.createElement("div");
      row.className = "message-row " + role;

      const bubble = document.createElement("div");
      bubble.className = "message-bubble";
      bubble.innerHTML = markdownToHtml(text);

      row.appendChild(bubble);
      content.appendChild(row);
    }

    function addPermissionCard(toolUseId, action) {
      const card = document.createElement("div");
      card.className = "permission-card";
      card.dataset.toolUseId = toolUseId;

      const title = document.createElement("div");
      title.className = "permission-title";
      title.textContent = "需要审批";

      const actionText = document.createElement("div");
      actionText.className = "permission-action";
      actionText.textContent = action;

      const buttons = document.createElement("div");
      buttons.className = "permission-buttons";

      const denyBtn = document.createElement("button");
      denyBtn.className = "perm-btn perm-btn-deny";
      denyBtn.textContent = "拒绝";
      denyBtn.addEventListener("click", function () {
        respond(toolUseId, false);
        card.style.opacity = "0.5";
        card.style.pointerEvents = "none";
      });

      const allowBtn = document.createElement("button");
      allowBtn.className = "perm-btn perm-btn-allow";
      allowBtn.textContent = "允许一次";
      allowBtn.addEventListener("click", function () {
        respond(toolUseId, true);
        card.style.opacity = "0.5";
        card.style.pointerEvents = "none";
      });

      const allowAllBtn = document.createElement("button");
      allowAllBtn.className = "perm-btn perm-btn-allow-all";
      allowAllBtn.textContent = "允许所有";
      allowAllBtn.addEventListener("click", function () {
        if (bridge) {
          bridge.allowAllPermission(currentSessionId, action);
        }
        document.querySelectorAll(".permission-card").forEach(function (c) {
          c.style.opacity = "0.5";
          c.style.pointerEvents = "none";
        });
      });

      buttons.appendChild(denyBtn);
      buttons.appendChild(allowBtn);
      buttons.appendChild(allowAllBtn);

      card.appendChild(title);
      card.appendChild(actionText);
      card.appendChild(buttons);

      content.appendChild(card);
    }

    function respond(toolUseId, approved) {
      resolvedPermissions.add(toolUseId);
      if (bridge) {
        bridge.respondPermission(currentSessionId, approved);
      }
    }

    function addQuestionCard(toolUseId, question, options) {
      const card = document.createElement("div");
      card.className = "question-card";
      card.dataset.toolUseId = toolUseId;

      const title = document.createElement("div");
      title.className = "question-title";
      title.textContent = "❓ " + (question || "请选择一个选项");

      const optionsContainer = document.createElement("div");
      optionsContainer.className = "question-options";

      // 渲染选项按钮
      (options || []).forEach(function (opt) {
        const btn = document.createElement("button");
        btn.className = "question-option-btn";
        btn.textContent = opt;
        btn.addEventListener("click", function () {
          respondQuestion(toolUseId, opt);
          card.classList.add("answered");
          const result = document.createElement("div");
          result.className = "question-answer-result";
          result.textContent = "已选择: " + opt;
          card.appendChild(result);
        });
        optionsContainer.appendChild(btn);
      });

      // "其他..." 按钮 + 输入框
      const otherBtn = document.createElement("button");
      otherBtn.className = "question-option-btn question-other-btn";
      otherBtn.innerHTML = '<span>其他...</span><span class="edit-icon">✎</span>';

      const inputArea = document.createElement("div");
      inputArea.className = "question-input-area";

      const input = document.createElement("input");
      input.className = "question-input";
      input.type = "text";
      input.placeholder = "请输入你的回答...";

      const sendBtn = document.createElement("button");
      sendBtn.className = "question-send-btn";
      sendBtn.textContent = "发送";

      inputArea.appendChild(input);
      inputArea.appendChild(sendBtn);

      otherBtn.addEventListener("click", function () {
        inputArea.classList.toggle("expanded");
        if (inputArea.classList.contains("expanded")) {
          input.focus();
        }
      });

      function submitCustomAnswer() {
        const val = input.value.trim();
        if (!val) return;
        respondQuestion(toolUseId, val);
        card.classList.add("answered");
        const result = document.createElement("div");
        result.className = "question-answer-result";
        result.textContent = "已输入: " + val;
        card.appendChild(result);
      }

      sendBtn.addEventListener("click", submitCustomAnswer);
      input.addEventListener("keydown", function (e) {
        if (e.key === "Enter") submitCustomAnswer();
      });

      optionsContainer.appendChild(otherBtn);
      optionsContainer.appendChild(inputArea);

      card.appendChild(title);
      card.appendChild(optionsContainer);

      content.appendChild(card);
    }

    function respondQuestion(toolUseId, answer) {
      resolvedPermissions.add(toolUseId);
      if (bridge) {
        bridge.respondQuestion(currentSessionId, answer);
      }
    }
  </script>
</body>
</html>
