island:
  position: top-center
  animation_enabled: true
  compact_timeout_ms: 5000
  expanded_max_height_ratio: 0.6
  position_offset_x: 0
  position_offset_y: 12
theme:
  id: dark
debug:
  mock_events_enabled: true
auto_approve:
  enabled: true
  tools:
    Read: true
    Bash:
    - ls
    - pwd
    - cat
    - echo
    - head
    - tail
    - grep
    - find
    - ps
    - date
    - whoami
    - hostname
    - id
    - which
    - type
    - stat
    - file
    - dirname
    - basename
    - readlink
    - realpath
    - uname
    - env
    - printenv
    - cd
    - touch
    - mkdir
    - rmdir
    - rm
    - cp
    - mv
    - chmod
    - chown
sound:
  enabled: true
  volume: 46
